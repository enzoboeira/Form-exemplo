<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mondrian</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ddd;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: grid;
      width: 748px;
      height: 748px;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 155px 20px 130px;
      gap: 9px;
      background-color: black;
      padding: 9px;
    }

    .item {
      background-color: #F0F1EC;
    }

    .red {
      background-color: #E72F24;
      grid-column: 1 / 2;
      grid-row: 1 / 2;
    }

    .white-top {
      grid-column: 2 / 5;
      grid-row: 1 / 2;
    }

    .white-left {
      grid-column: 1 / 2;
      grid-row: 2 / 5;
    }

    .white-center {
      grid-column: 2 / 4;
      grid-row: 2 / 4;
    }

    .blue {
      background-color: #004592;
      grid-column: 4 / 5;
      grid-row: 2 / 3;
    }

    .yellow {
      background-color: #F9D01E;
      grid-column: 2 / 3;
      grid-row: 4 / 5;
    }

    .black-small {
      background-color: #232629;
      grid-column: 3 / 4;
      grid-row: 4 / 5;
    }

    .white-bottom {
      grid-column: 4 / 5;
      grid-row: 3 / 5;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="item red"></div>
    <div class="item white-top"></div>
    <div class="item white-left"></div>
    <div class="item white-center"></div>
    <div class="item blue"></div>
    <div class="item yellow"></div>
    <div class="item black-small"></div>
    <div class="item white-bottom"></div>
  </div>
</body>
</html>
