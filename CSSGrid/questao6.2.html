<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractional Size Grid</title>
  <style>

    .grid-container {
    display: grid;
    grid-template-columns: 1fr 400px minmax(200px, 500px);
    grid-template-rows: repeat(3, auto) 50px;
    }

    .grid-item {
    font-size: 1.2rem;
    background: linear-gradient(to bottom, #a100c5, #7a00a3);
    border: 5px solid goldenrod;
    color: white;
    padding: 10px;
    }
  </style>
</head>

<body>
  <h1>Fractional Size Grid</h1>
  <div class="grid-container">
    <div class="grid-item">width expands to fill space</div>
    <div class="grid-item">400px wide</div>
    <div class="grid-item">min 200px max 500px wide</div>
  
    <div class="grid-item">width expands to fill space</div>
    <div class="grid-item">400px wide</div>
    <div class="grid-item">min 200px max 500px wide</div>
  
    <div class="grid-item">width expands to fill space</div>
    <div class="grid-item">400px wide</div>
    <div class="grid-item">min 200px max 500px wide</div>
  
    <div class="grid-item">50px high</div>
  </div>
</body>

</html>
