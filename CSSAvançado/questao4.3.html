<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsividade CSS</title>

<style>

body {
  margin: 0;
  font-family: Arial;
}

.container {
  display: flex;
  justify-content: space-around;
  padding: 20px;
}

.box {
  width: 30%;
  height: 200px;
  background: lightblue;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 20px;
}

.grid div {
  background: lightcoral;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
}

@media (max-width: 900px) {
  .container {
    flex-direction: column;
  }

  .box {
    width: 100%;
    margin-bottom: 10px;
  }

  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }

  body {
    background: #f4f4f4;
  }
}

</style>
</head>

<body>

<h2 style="text-align:center;">TESTE FLEXBOX</h2>

<div class="container">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
</div>

<h2 style="text-align:center;">TESTE GRID</h2>

<div class="grid">
  <div>A</div>
  <div>B</div>
  <div>C</div>
  <div>D</div>
  <div>E</div>
  <div>F</div>
</div>

</body>
</html>
